name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Pinned to a stable Actions runtime; doesn't need to match the local dev interpreter.
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Syntax check (all tracked .py files)
        run: git ls-files '*.py' | xargs -n1 python -m py_compile

      - name: Import check (library modules only — scripts/ excluded, they run live ETL on import)
        run: |
          python -c "
          import importlib
          mods = ['app', 'src.database', 'src.api_client', 'src.models',
                   'etl.load_teams', 'etl.load_standings', 'etl.load_rosters',
                   'etl.load_schedule', 'etl.load_boxscores', 'etl.load_season_stats',
                   'etl.enrich_players']
          for m in mods:
              importlib.import_module(m)
              print(f'OK: {m}')
          "

      - name: Tests
        run: python -m pytest tests/ -v

      - name: Dependency audit + SAST (bandit, pip-audit)
        run: ./scripts/audit.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
